name: Backend CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: onlinestore_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d onlinestore_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "ci-secret-key"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,testserver"
      POSTGRES_DB: "onlinestore_test"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_HOST: "127.0.0.1"
      POSTGRES_PORT: "5432"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Django checks
        working-directory: backend
        run: |
          python manage.py check

      - name: Migrate
        working-directory: backend
        run: |
          python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: |
          python manage.py test tests.test_course_requirements tests.test_tasks -v 2
